name: Android build (AAB / APK)
run-name: "Android • ${{ inputs.target }} • ${{ inputs.ref || github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        type: choice
        required: true
        default: release_aab
        options:
        - release_aab
        - release_apk
        - debug_apk
      ref:
        description: "Git ref (branch/tag/sha), leave empty to use selected branch"
        required: false
        default: ""
  workflow_call:
    inputs:
      target:
        description: "What to build"
        type: string
        required: true
      ref:
        description: "Git ref (branch/tag/sha)"
        required: false
        default: ""
        type: string
    secrets:
      CHECKOUT_TOKEN:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

jobs:
  build:
    name: "Build (${{ inputs.target }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref || github.ref_name }}
        token: ${{ secrets.CHECKOUT_TOKEN || github.token }}
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: "17"

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4

    - name: Configure build
      id: cfg
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail
        case "${BUILD_TARGET}" in
          release_aab)
            echo "gradle_task=bundleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=aab" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-aab" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          release_apk)
            echo "gradle_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=release-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=true" >> "$GITHUB_OUTPUT"
            ;;
          debug_apk)
            echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "kind=apk" >> "$GITHUB_OUTPUT"
            echo "artifact_name=debug-apk" >> "$GITHUB_OUTPUT"
            echo "needs_signing=false" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Unknown target: ${BUILD_TARGET}" >&2
            exit 1
            ;;
        esac

    - name: Decode keystore from secret
      if: ${{ steps.cfg.outputs.needs_signing == 'true' }}
      shell: bash
      env:
        KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        set -euo pipefail
        if [[ -z "${KEYSTORE_B64}" ]]; then
          echo "Missing secret ANDROID_KEYSTORE_BASE64" >&2
          exit 1
        fi
        echo "${KEYSTORE_B64}" | base64 --decode > release.keystore.jks
        echo "KEYSTORE_PATH=${PWD}/release.keystore.jks" >> "$GITHUB_ENV"

    - name: Build
      shell: bash
      env:
        GRADLE_TASK: ${{ steps.cfg.outputs.gradle_task }}
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        set -euo pipefail
        chmod +x ./gradlew
        ./gradlew --no-daemon --no-build-cache --stacktrace "${GRADLE_TASK}"

    - name: Collect built artifacts
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail
        mkdir -p output
        case "${BUILD_TARGET}" in
          release_aab)
            cp ./ui/build/outputs/bundle/release/ui-release.aab output/
            ;;
          debug_apk)
            cp ./ui/build/outputs/apk/debug/*.apk output/
            ;;
          release_apk)
            cp ./ui/build/outputs/apk/release/*.apk output/
            ;;
          *)
            echo "Unknown target: ${BUILD_TARGET}" >&2
            exit 1
            ;;
        esac
        echo "::group::Collected artifacts"
        ls -lh output/
        echo "::endgroup::"

    - name: Verify release signing
      if: ${{ steps.cfg.outputs.needs_signing == 'true' }}
      shell: bash
      env:
        BUILD_KIND: ${{ steps.cfg.outputs.kind }}
      run: |
        set -euo pipefail
        if [[ "${BUILD_KIND}" == "aab" ]]; then
          AAB="$(ls output/*.aab)"
          jarsigner -verify -verbose "${AAB}" | head -20
        else
          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          for APK in output/*.apk; do
            "${APKSIGNER}" verify --verbose "${APK}"
          done
        fi
        echo "::group::Release artifacts"
        ls -lh output/
        echo "::endgroup::"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.cfg.outputs.artifact_name }}
        path: output/*
        if-no-files-found: error
